version: "3.8"

# ─────────────────────────────────────────────────────────
#  Big Data Stack — Olist E-commerce Analysis
#  Hadoop 3.2.1 + Spark 3.0.0 + JupyterLab
# ─────────────────────────────────────────────────────────

networks:
  bigdata_net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode:

services:

  # ── HADOOP HDFS ─────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # Web UI HDFS
      - "8020:8020"   # HDFS protocol
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=olist_bigdata
    env_file:
      - hadoop.env
    networks:
      - bigdata_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    restart: unless-stopped
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - hadoop.env
    depends_on:
      - namenode
    networks:
      - bigdata_net

  # ── SPARK CLUSTER ────────────────────────────────────────
  spark-master:
    image: bde2020/spark-master:3.0.0-hadoop3.2
    container_name: spark-master
    restart: unless-stopped
    ports:
      - "18080:8080"  # Spark Web UI (18080 para evitar conflicto con puerto local)
      - "7077:7077"   # Spark protocol
    environment:
      - INIT_DAEMON_STEP=setup_spark
    env_file:
      - hadoop.env
    networks:
      - bigdata_net

  spark-worker-1:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: spark-worker-1
    restart: unless-stopped
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    env_file:
      - hadoop.env
    networks:
      - bigdata_net

  spark-worker-2:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: spark-worker-2
    restart: unless-stopped
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    env_file:
      - hadoop.env
    networks:
      - bigdata_net

  # ── JUPYTERLAB ───────────────────────────────────────────
  jupyter:
    build:
      context: ./docker/jupyter
      dockerfile: Dockerfile
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ./data:/home/jovyan/work/data
      - ./outputs:/home/jovyan/work/outputs
    environment:
      - SPARK_MASTER=local[*]
      - HADOOP_NAMENODE=hdfs://namenode:8020
      - JUPYTER_TOKEN=bigdata2024
      - JUPYTER_ENABLE_LAB=yes
    depends_on:
      - spark-master
      - namenode
    networks:
      - bigdata_net
